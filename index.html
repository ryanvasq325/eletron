<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Electron - Provocação Histórica</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            position: relative; 
        }

        #palmeiras-symbol {
            cursor: pointer;
            width: 200px;
            transition: transform 0.3s ease;
        }

        #palmeiras-symbol:hover {
            transform: scale(1.1);
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        #flamengo-image {
            display: none;
            width: 500px;
            max-width: 90%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Estilo da Seta */
        #btn-proximo {
            display: none; /* Começa escondida */
            position: absolute;
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
            background: #c90c0f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background 0.3s, transform 0.2s;
        }

        #btn-proximo:hover {
            background: #ff0000;
            transform: translateY(-50%) scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin-bottom: 20px; font-weight: 300; }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="titulo">Clique no escudo para a verdade:</h2>
        
        <img id="palmeiras-symbol" 
             src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Palmeiras_logo.svg/960px-Palmeiras_logo.svg.png" 
             alt="Escudo do Palmeiras">

        <div class="image-wrapper">
            <img id="flamengo-image" src="" alt="Flamengo Campeão">
            
            <button id="btn-proximo" title="Próxima imagem">➜</button>
        </div>
    </div>

    <script>
        const escudo = document.getElementById('palmeiras-symbol');
        const imagemFlamengo = document.getElementById('flamengo-image');
        const btnProximo = document.getElementById('btn-proximo');
        const titulo = document.getElementById('titulo');

        const urlImagem1 = "https://lncimg.lance.com.br/cdn-cgi/image/width=950,quality=75,fit=pad,format=webp/uploads/2025/11/Memes-Flamengo-x-Palmeiras-Libertadores-2025-2.png";
        const urlImagem2 = "https://lncimg.lance.com.br/cdn-cgi/image/width=950,quality=75,fit=pad,format=webp/uploads/2025/11/Memes-Flamengo-x-Palmeiras-Libertadores-2025-3.png";

        
        escudo.addEventListener('click', () => {
            escudo.style.display = 'none';
            imagemFlamengo.src = urlImagem1;
            imagemFlamengo.style.display = 'block';
            btnProximo.style.display = 'flex'; 
            btnProximo.style.justifyContent = 'center';
            btnProximo.style.alignItems = 'center';
            titulo.innerText = "51 é pinga!";
        });

      
        btnProximo.addEventListener('click', () => {
            imagemFlamengo.src = urlImagem2;
            titulo.innerText = "Chora Palmeiras";
            btnProximo.style.display = 'none'; 
        });
    </script>
</body>
</html>
