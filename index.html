<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Electron Dodge</title>
    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #38bdf8;
            border-radius: 8px;
            background-color: #1e293b;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            cursor: none; /* Esconde o mouse sobre o jogo */
        }
        .ui {
            text-align: center;
            margin-bottom: 10px;
        }
        #score { color: #38bdf8; font-weight: bold; font-size: 1.5rem; }
        .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>Electron <span style="color: #38bdf8">Dodge</span></h1>
        <div>Pontuação: <span id="score">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="hint">Use o mouse ou as setas para mover o Átomo</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let gameActive = true;

        const player = {
            x: 200,
            y: 450,
            size: 15,
            color: '#38bdf8'
        };

        const enemies = [];
        const enemySpeed = 4;
        const spawnRate = 0.03; // Chance de surgir inimigo por frame

        // Controle por Mouse
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
        });

        function createEnemy() {
            if (Math.random() < spawnRate) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    size: 10 + Math.random() * 15,
                    speed: 2 + Math.random() * 4
                });
            }
        }

        function update() {
            if (!gameActive) return;

            createEnemy();

            enemies.forEach((enemy, index) => {
                enemy.y += enemy.speed;

                // Colisão
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.size + enemy.size) {
                    gameOver();
                }

                // Remove inimigos fora da tela
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                    score++;
                    scoreElement.innerText = score;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha Player (Átomo)
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.closePath();

            // Desenha Inimigos (Bugs)
            ctx.shadowBlur = 0;
            enemies.forEach(enemy => {
                ctx.beginPath();
                ctx.rect(enemy.x - enemy.size/2, enemy.y - enemy.size/2, enemy.size, enemy.size);
                ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.closePath();
            });

            if (gameActive) {
                requestAnimationFrame(() => {
                    update();
                    draw();
                });
            }
        }

        function gameOver() {
            gameActive = false;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f8fafc';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
            ctx.font = '16px Arial';
            ctx.fillText('Clique para reiniciar', canvas.width/2, canvas.height/2 + 40);
        }

        canvas.addEventListener('click', () => {
            if (!gameActive) {
                score = 0;
                scoreElement.innerText = score;
                enemies.length = 0;
                gameActive = true;
                draw();
            }
        });

        draw();
    </script>
</body>
</html>
